<!DOCTYPE html>
<html>
<head>
<title>login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-wrapper">

    <div class="container">

        <h1>VersionForge</h1>

        <p id="welcomeText">Sign in to continue</p>

        <input
            type="email"
            id="email"
            placeholder="Email">

        <input
            type="password"
            id="password"
            placeholder="Password">

        <button onclick="login()">
            Login
        </button>

        <br><br>

        <p style="text-align:center;">
            <a href="register.html">Create Account</a>
        </p>

    </div>

</div>

<script src="login.js"></script>

</body>
</html>
